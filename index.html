<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>EurosHunter</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="start-screen" class="container">
    <div class="overlay-bg"></div> <h1>€XP€NSE HUNTER</h1>
    
    <div id="welcome-message">
      <p>Welcome €Hunter !<br>How much can you save within 3 minutes ? ?</p>
      <div id="rules">
        <h3>Rules :</h3>
        <ul>
          <li> Catch (+)  : Incomes & Savings</li>
          <li> Evoid (-)  : Debts & Expenses</li>
          <li>🕹️ move your finger on  Mobile Or keyboearrd arrows on PC : </li>
        </ul>
      </div>
    </div>
    
    <button id="start-btn">COMMENCER !</button>
  </div>

  <div id="game-screen" class="container">
    
    <div id="hud-top">
        <div id="score-box">Score: <span id="score-val">0</span>€</div>
        <div id="timer-box">⏱ <span id="timer-val">180</span>s</div>
        <div id="mute-container">
            <button id="mute-btn">🔊</button>
        </div>
    </div>

    <div id="game-box"></div>

    <div id="hud-bottom">
        <div class="game-controls">
            <button id="pause-btn">Pause</button>
            <button id="restart-btn">Restart</button>
        </div>
    </div>

    <audio id="bg-music" src="./audio/Boléro_de_Ravel.mp3" loop></audio>
    <audio id="impact-sound" src="./audio/impact.mp3"></audio>
  </div>

  <div id="game-over-screen" class="container">
    <h1>GAME OVER</h1>
    <div id="final-score-display"> final Score  : <span id="final-score-val">0</span>€</div>
    <button id="restart-btn-over" class="big-btn">PLAY AGAIN</button>
  </div>

  <script src="./js/man.js"></script>
  <script src="./js/elements.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
